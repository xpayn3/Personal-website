<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0a0a0a"/>
  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5">
    <path d="M0 50 H200 M0 100 H200 M0 150 H200 M50 0 V200 M100 0 V200 M150 0 V200"/>
  </g>
  <!-- recursive tree silhouette built from straight strokes -->
  <g stroke="#ffffff" fill="none" stroke-width="2" stroke-linecap="round">
    <!-- trunk -->
    <line x1="100" y1="180" x2="100" y2="120"/>
    <!-- main fork -->
    <line x1="100" y1="120" x2="78" y2="92"/>
    <line x1="100" y1="120" x2="124" y2="94"/>
    <!-- second level -->
    <line x1="78" y1="92" x2="62" y2="74"/>
    <line x1="78" y1="92" x2="86" y2="64"/>
    <line x1="124" y1="94" x2="142" y2="78"/>
    <line x1="124" y1="94" x2="118" y2="62"/>
    <!-- third level twigs -->
    <line x1="62" y1="74" x2="55" y2="60"/>
    <line x1="62" y1="74" x2="68" y2="58"/>
    <line x1="86" y1="64" x2="84" y2="48"/>
    <line x1="86" y1="64" x2="94" y2="50"/>
    <line x1="142" y1="78" x2="146" y2="62"/>
    <line x1="142" y1="78" x2="138" y2="60"/>
    <line x1="118" y1="62" x2="114" y2="46"/>
    <line x1="118" y1="62" x2="124" y2="48"/>
  </g>
  <!-- leaf cluster dots at the tips -->
  <g fill="#ffffff">
    <circle cx="55" cy="60" r="2.4"/>
    <circle cx="68" cy="58" r="2.4"/>
    <circle cx="84" cy="48" r="2.4"/>
    <circle cx="94" cy="50" r="2.4"/>
    <circle cx="146" cy="62" r="2.4"/>
    <circle cx="138" cy="60" r="2.4"/>
    <circle cx="114" cy="46" r="2.4"/>
    <circle cx="124" cy="48" r="2.4"/>
  </g>
  <!-- techy label -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#ffffff" font-weight="700">
    <text x="10" y="24" font-size="9" letter-spacing="2.4" opacity="0.9">// WEBGPU</text>
    <text x="10" y="192" font-size="8" letter-spacing="2.4" opacity="0.55">35 SPECIES · LIVE</text>
  </g>
</svg>
